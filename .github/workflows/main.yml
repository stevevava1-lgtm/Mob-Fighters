name: One-Time Game Update
on:
  schedule:
    # Runs at 00:00 UTC on Thursday, April 16, 2026
    - cron: '0 0 16 4 4'
  workflow_dispatch:

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'release-v1' # This pulls files from your specific release branch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.1-update"
          name: "Official Game Update"
          body: "Automatic scheduled update for April 16, 2026."
          # REPLACE 'your-game-file.zip' with the ACTUAL name of your file
          files: your-game-file.zip 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
