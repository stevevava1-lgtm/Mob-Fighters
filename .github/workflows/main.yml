name: Tomorrow's Game Update
on:
  schedule:
    # This triggers at 8:00 AM (your local time) on April 16th
    - cron: '0 0 16 4 *'
  workflow_dispatch: # This adds a "Run" button so you can test it manually

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Package Game
        run: zip -r Boss-Fighting-Update.zip index.html script.js style.css

      - name: Publish Update
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.1"
          name: "The Boss Update"
          files: Boss-Fighting-Update.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
