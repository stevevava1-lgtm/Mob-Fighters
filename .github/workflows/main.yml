name: Tomorrow's Noon Update
on:
  schedule:
    # 12:00 PM (Noon) on April 16, 2026
    - cron: '0 12 16 4 *'
      timezone: "Asia/Taipei" 
  workflow_dispatch:

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip the game files
        run: zip -r MobFighters-Update.zip index.html script.js style.css

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.1"
          name: "Official Game Update"
          files: MobFighters-Update.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
