<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grow Some Plants</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="hud" aria-label="Controls">
      <p>WASD · E · B · wheel = hotbar slot · middle-click = center map · right-click Buy for quantity</p>
    </div>

    <main class="game-wrap">
      <canvas id="game" width="960" height="600" aria-label="Garden game canvas"></canvas>
      <div id="bootGate" class="boot-gate" role="button" tabindex="0" aria-label="Click to start game">
        <p class="boot-gate-hint">Click the game to play</p>
      </div>
      <div id="loadingScreen" class="loading-screen hidden" aria-live="polite" aria-hidden="true">
        <div class="loading-screen-inner">
          <h1 class="loading-title">GROW SOME PLANTS</h1>
          <p class="loading-sub">Loading</p>
        </div>
      </div>
    </main>

    <section id="menuOverlay" class="overlay hidden" aria-live="polite">
      <div class="menu-card">
        <h2 id="menuTitle"></h2>
        <p id="menuDesc"></p>
        <div id="menuActions" class="menu-actions"></div>
        <button id="closeMenuBtn" type="button">Close</button>
      </div>
    </section>

    <script src="./game.js?v=3"></script>
  </body>
</html>
